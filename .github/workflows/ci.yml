name: 🚀 CI — PSS Trust Portal

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Type Check + Build
  # ─────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔷 Run TypeScript type check (frontend)
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2: Build Check
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: typecheck

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: Dependency Audit
  # ─────────────────────────────────────────
  audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: npm audit --audit-level=critical
        continue-on-error: true